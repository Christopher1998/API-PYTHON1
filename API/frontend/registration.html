<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Cuenta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="flex w-full max-w-3xl bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-200">

    <!-- Panel izquierdo -->
    <div class="hidden md:flex w-5/12 bg-blue-800 flex-col items-center justify-center p-10 gap-6">
      <div class="flex items-center gap-3">
        <div class="bg-blue-700 p-2 rounded-lg">
          <svg class="w-6 h-6 text-blue-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5"/>
          </svg>
        </div>
        <span class="text-blue-200 text-lg font-medium">CorpSuite</span>
      </div>
      <p class="text-blue-50 text-xl font-medium text-center leading-snug">
       Join our<br/>platform today
      </p>
      <p class="text-blue-300 text-sm text-center leading-relaxed">
        Create your account and start managing<br/>your business in minutes.
      </p>
    </div>

    <!-- Panel derecho (formulario) -->
    <div class="flex-1 flex flex-col justify-center p-10">
      <h2 class="text-xl font-medium text-gray-800 mb-1">Create account</h2>
      <p class="text-sm text-gray-500 mb-7">Fill in the fields to registe</p>

      <form>
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-500 mb-1">Username</label>
          <input type="text" name="usuario" placeholder="Username" required
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-500 mb-1">Password</label>
          <input type="password" name="contrasena" placeholder="••••••••" required
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <div class="mb-6">
          <label class="block text-xs font-medium text-gray-500 mb-1">Confirm password</label>
          <input type="password" name="confirmar" placeholder="••••••••" required
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <p class="text-xs text-red-500 mt-1 hidden" id="error-match">passwords do not match</p>
        </div>

        <button type="submit"
          class="w-full py-2.5 bg-blue-700 hover:bg-blue-800 text-blue-50 text-sm font-medium rounded-lg transition-colors">
          Register
        </button>
      </form>

      <p class="text-sm text-center text-gray-500 mt-6">
        Already have an account?
        <a href="./index.html" class="text-blue-700 hover:underline">Sign in</a>
      </p>
    </div>

  </div>

  <script type="module" src="./pages/register.js"></script>
</body>
</html>
